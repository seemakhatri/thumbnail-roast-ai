<div class="nf-page">
  <div class="nf-header">
    <span class="nf-badge">404</span>
    <lucide-angular [img]="icons.searchX" size="48" class="nf-icon" />
    <h1>This page didn't make the cut.</h1>
    <p>
      The page you're looking for doesn't exist, moved, or never got a good enough thumbnail
      to survive. Let's get you back on track.
    </p>
  </div>
  <div class="nf-actions">
    <a routerLink="/" class="nf-btn nf-btn--primary">
      <lucide-angular [img]="icons.home" size="16" /> Back to Home
    </a>
    <a routerLink="/dashboard" class="nf-btn nf-btn--ghost">
      Go to Dashboard <lucide-angular [img]="icons.arrowRight" size="14" />
    </a>
  </div>
</div>

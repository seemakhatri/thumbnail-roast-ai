<section class="hero" id="top" aria-label="Hero">

  <!-- Background -->
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__grid"></div>
    <div class="hero__glow-primary"></div>
  </div>



  <div class="logo"> 
       <img src="assets/FINAL.svg" alt="ThumbnailRoast" class="nb__logo-icon" />
  </div>
  <!-- Badge / Eyebrow (like "OPEN SOURCE · RUNS ON YOUR MACHINE") -->
  <span class="hero__badge fade-up d1">
    AI Thumbnail Intelligence | Stop Losing Views
  </span>

  <!-- Headline (uses Switzer / clean sans) -->
  <h1 class="hero__headline fade-up d2">
    AI CTR Intelligence For Creators<br>
  </h1>

  

  <!-- Sub copy -->
  <p class="hero__sub fade-up d3">
    Upload your thumbnail, discover what's holding it back,
    and get clear fixes before you hit publish.
  </p>

  <!-- CTA Buttons -->
  <div class="hero__actions fade-up d4">
    <button class="hero__cta" type="button" (click)="scrollToAnalyze()">
      Get Started
    </button>
    <button class="hero__cta-ghost" type="button" (click)="scrollToHowItWorks()">
      See how it works
      <lucide-angular [img]="icons.arrowDown" size="14" class="hero__cta-ghost-icon" aria-hidden="true" />
    </button>
  </div>

</section>

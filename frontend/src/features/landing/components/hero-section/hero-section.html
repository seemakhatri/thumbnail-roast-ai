<section class="hero" id="top" aria-label="Hero">

  <!-- Background -->
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__grid"></div>
    <div class="hero__glow-primary"></div>
  </div>

  <span class="hero__badge fade-up d1">
    Stop Guessing. Start Proving.
  </span>

  <h1 class="hero__headline fade-up d2">
    Your thumbnail is good.<br>
    <span class="hero__headline--fire">Is it working?</span>
  </h1>

  <p class="hero__sub fade-up d3">
    Upload once. Get a clear decision: <strong>Publish as-is</strong> or <strong>one high-impact fix</strong>.<br>
    Then track if it actually moved your CTR.
  </p>

  <div class="hero__actions fade-up d4">
    <button class="hero__cta" (click)="scrollToAnalyze()">
      <lucide-angular [img]="icons.flame" size="16" />
      Analyze Your Thumbnail — Free
    </button>
    <button class="hero__cta-ghost" (click)="scrollToHowItWorks()">
      How it works
      <lucide-angular [img]="icons.arrowDown" size="14" />
    </button>
  </div>

  <!-- Trust bar -->
  <div class="hero__trust fade-up d5">
    <div class="hero__trust-item">
      <span class="hero__trust-num">12,400+</span>
      <span class="hero__trust-label">thumbnails analyzed</span>
    </div>
    <div class="hero__trust-divider"></div>
    <div class="hero__trust-item">
      <span class="hero__trust-num">+31%</span>
      <span class="hero__trust-label">avg CTR improvement</span>
    </div>
    <div class="hero__trust-divider"></div>
    <div class="hero__trust-item">
      <span class="hero__trust-num">4.9/5</span>
      <span class="hero__trust-label">creator satisfaction</span>
    </div>
  </div>

</section>

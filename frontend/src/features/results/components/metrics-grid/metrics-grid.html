<!-- metrics-grid.html -->
<div class="metrics-grid-wrap">
  <div class="metrics-grid-header">
    <span class="metrics-grid-eyebrow">Performance Breakdown</span>
  </div>
  <div class="metrics-grid">
    @for (m of metrics; track m.key; let i = $index) {
      <div class="metric-card" [@stagger]="i">
        <div class="metric-card__top">
          <span class="metric-card__icon">{{ m.icon }}</span>
          <span class="metric-card__name">{{ m.label }}</span>
        </div>
        <div class="metric-card__score-row">
          <span class="metric-card__score" [style.color]="scoreColor(getScore(m.key))">
            {{ getScore(m.key) }}
          </span>
          <span class="metric-card__status" [class]="statusClass(getScore(m.key))">
            {{ statusLabel(getScore(m.key)) }}
          </span>
        </div>
        <div class="metric-card__bar-bg">
          <div
            class="metric-card__bar-fill"
            [style.width.%]="getScore(m.key)"
            [style.background]="barGradient(getScore(m.key))"
          ></div>
        </div>
      </div>
    }
  </div>
</div>

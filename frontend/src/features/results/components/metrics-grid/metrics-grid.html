<div class="metrics-list">
  @for (m of metrics; track m.key) {
    <div class="metric-row">
      <div class="metric-row__left">
        <lucide-angular [img]="m.icon" size="14" class="metric-row__icon" />
        <span class="metric-row__label">{{ m.label }}</span>
      </div>
      <div class="metric-row__bar">
        <div class="metric-row__track">
          <div class="metric-row__fill" [style.width.%]="getScore(m.key)" [style.background]="scoreColor(getScore(m.key))"></div>
        </div>
        <span class="metric-row__score" [style.color]="scoreColor(getScore(m.key))">
          {{ getScore(m.key) }}
        </span>
      </div>
    </div>
  }
</div>

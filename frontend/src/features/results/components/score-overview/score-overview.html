<div class="score-overview">

  <!-- Left: thumbnail -->
  <div class="so-thumb">
    @if (report().image_url) {
    <img [src]="report().image_url" [alt]="report().roast_title" class="so-thumb__img" />
    } @else {
    <div class="so-thumb__placeholder">🖼️</div>
    }
    <div class="so-thumb__badge">
      <span class="so-thumb__badge-dot"></span>
      Analyzed
    </div>
  </div>

  <!-- Right: score + metrics -->
  <div class="so-main">

    <!-- Score ring + verdict -->
    <div class="so-top">
      <div class="so-ring-wrap">
        <app-score-ring [score]="report().overall_score" [size]="100" [radius]="40" />
        <div class="so-ring-label">/ 100</div>
      </div>

      <div class="so-verdict">
        <div class="so-verdict__badge" [ngClass]="verdictCss()">
          {{ verdictEmoji() }} {{ verdictLabel() }}
        </div>
        <h2 class="so-verdict__title">"{{ report().roast_title }}"</h2>
        <p class="so-verdict__date">{{ report().created_at | date:'mediumDate' }}</p>
      </div>
    </div>

    <!-- Metric bars -->
    <div class="so-metrics">
      @for (m of metrics; track m.key) {
      <div class="so-metric">
        <div class="so-metric__header">
          <span class="so-metric__name">{{ m.label }}</span>
          <span class="so-metric__value" [style.color]="scoreColor(getScore(m.key))">
            {{ getScore(m.key) }}
          </span>
        </div>
        <div class="so-metric__track">
          <div class="so-metric__fill" [style.width.%]="getScore(m.key)"
            [style.background]="scoreGradient(getScore(m.key))"></div>
        </div>
      </div>
      }
    </div>

  </div>
</div>

@if (topRec()) {
  <div class="priority-rec" [@slideUp]>
    <div class="priority-rec__label">
      <lucide-angular [img]="icons.zap" size="14" class="priority-rec__label-icon" />
      Highest Impact Fix
    </div>
    <h3 class="priority-rec__title">{{ topRec()!.title }}</h3>
    <p class="priority-rec__body">{{ topRec()!.description }}</p>
    <div class="priority-rec__impact">
      <lucide-angular [img]="icons.trendingUp" size="16" class="priority-rec__impact-icon" />
      {{ topRec()!.impact }}
    </div>
  </div>
} @else if (showPublishAsIs()) {
  <div class="priority-rec priority-rec--positive" [@slideUp]>
    <div class="priority-rec__label">
      <lucide-angular [img]="icons.check" size="14" class="priority-rec__label-icon" />
      Ready to Publish
    </div>
    <h3 class="priority-rec__title">No changes recommended</h3>
    <p class="priority-rec__body">{{ whyItWorks() }}</p>
  </div>
}

<!-- recommendations-timeline.html -->
<div class="rec-timeline">
  <div class="rec-timeline__eyebrow">Roadmap to a Better Thumbnail</div>

  <div class="rec-timeline__list">
    @for (rec of report().recommendations; track rec.title; let i = $index; let last = $last) {
      <div class="rec-timeline__item" [@slideUp]>

        <!-- Vertical line + node -->
        <div class="rec-timeline__track">
          <div class="rec-timeline__node" [class]="nodeCss(rec.priority)"></div>
          @if (!last) {
            <div class="rec-timeline__line"></div>
          }
        </div>

        <!-- Content -->
        <div class="rec-timeline__content">
          <div class="rec-timeline__top">
            <span class="rec-timeline__priority" [class]="priorityCss(rec.priority)">
              {{ priorityLabel(rec.priority) }}
            </span>
            <span class="rec-timeline__category">{{ rec.category }}</span>
          </div>
          <h4 class="rec-timeline__title">{{ rec.title }}</h4>
          <p class="rec-timeline__desc">{{ rec.description }}</p>
          <div class="rec-timeline__impact">
            <span class="rec-timeline__impact-icon">↑</span>
            {{ rec.impact }}
          </div>
        </div>

      </div>
    }
  </div>
</div>

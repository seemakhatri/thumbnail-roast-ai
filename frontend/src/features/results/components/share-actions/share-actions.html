@if (showTabs()) {
<div class="share-row">
  <div class="tab-nav">
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'overview'" (click)="setTab('overview')">
      Overview
    </button>
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'recommendations'"
      (click)="setTab('recommendations')">
      Recommendations
    </button>
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'competitor'" (click)="setTab('competitor')">
      Competitor Intel
    </button>
  </div>
  <div class="share-actions">
    @if (report()) {
    <button type="button" class="btn-sm" (click)="copyShareLink()">
      <lucide-angular [img]="icons.share" size="14" />
      Share Report
    </button>
    <button type="button" class="btn-sm" (click)="tweetScore()">
      <lucide-angular [img]="icons.twitter" size="14" />
      Tweet Score
    </button>
    }
    <a routerLink="/analyze" class="btn-sm orange">
      <lucide-angular [img]="icons.flame" size="14" />
      New Analysis
    </a>
  </div>
</div>
} @else {
<div class="share-row">
  <div></div>
  <div class="share-actions">
    @if (report()) {
    <button type="button" class="btn-sm" (click)="copyShareLink()">
      <lucide-angular [img]="icons.share" size="14" />
      Copy Share Link
    </button>
    }
    <a routerLink="/analyze" class="btn-sm orange">
      <lucide-angular [img]="icons.flame" size="14" />
      New Analysis
    </a>
  </div>
</div>
}

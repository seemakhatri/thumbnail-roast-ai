<div class="card card-inner recommendations-card" id="recommendations-section">
  <div class="rec-heading">⚡ Actionable Recommendations</div>
  <div class="rec-list">
    @for (rec of report().recommendations; track rec.title) {
      <div class="rec-item">
        <div>
          <span class="rec-priority" [class]="priorityClass(rec.priority)">
            {{ priorityLabel(rec.priority) }}
          </span>
        </div>
        <div class="rec-content">
          <h4>{{ rec.title }}</h4>
          <p>{{ rec.description }}</p>
          <div class="rec-impact">{{ rec.impact }}</div>
        </div>
      </div>
    }
  </div>
</div>

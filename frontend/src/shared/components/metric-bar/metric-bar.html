<div class="metric-item">
  <div class="metric-header">
    <span class="metric-name">{{ label() }}</span>
    <span class="metric-value" [style.color]="style().color">{{ score() }}</span>
  </div>
  <div class="metric-bar-bg">
    <div class="metric-bar-fill" [style.width.%]="score()" [style.background]="style().gradient"></div>
  </div>
</div>
